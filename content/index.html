<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniBioAI · Videos</title>
<style>
  :root {
    --bg:      #0b0f14;
    --bg2:     #111820;
    --bg3:     #161e28;
    --border:  rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent:  #00e5a0;
    --accent2: #0094ff;
    --accent3: #ff6b35;
    --text:    #dde4ed;
    --muted:   #4a5a6a;
    --warn:    #ffa502;
    --danger:  #ff4757;
    --mono:    'JetBrains Mono', 'Fira Mono', monospace;
    --font:    'Inter', system-ui, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
  }

  .topbar {
    height: 48px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .topbar-path { display: flex; align-items: center; gap: 6px; }
  .topbar-path .sep { color: var(--border2); }
  .topbar-path .current { color: var(--text); }
  .topbar-badges { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .pill {
    font-family: var(--mono);
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.08em;
  }

  .pill-blue   { background: rgba(0,148,255,0.12); color: var(--accent2); border: 1px solid rgba(0,148,255,0.2); }
  .pill-green  { background: rgba(0,229,160,0.12); color: var(--accent);  border: 1px solid rgba(0,229,160,0.2); }
  .pill-orange { background: rgba(255,107,53,0.12); color: var(--accent3); border: 1px solid rgba(255,107,53,0.2); }

  .page { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  .page-heading { margin-bottom: 24px; }
  .page-heading h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.01em; margin-bottom: 3px; }
  .page-heading p  { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }

  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 7px 12px 7px 32px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: rgba(0,229,160,0.4); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 13px;
    pointer-events: none;
  }

  .filter-btn {
    padding: 6px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: rgba(0,229,160,0.1); border-color: rgba(0,229,160,0.25); color: var(--accent); }

  .video-count { margin-left: auto; font-size: 10px; font-family: var(--mono); color: var(--muted); }

  /* ── Manifest hint banner ───────────────────────────────────── */
  .manifest-hint {
    margin-bottom: 16px;
    padding: 10px 14px;
    background: rgba(0,148,255,0.06);
    border: 1px solid rgba(0,148,255,0.15);
    border-radius: 8px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .manifest-hint code { color: var(--accent2); }
  .manifest-hint .source-badge {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  .badge-manifest { background: rgba(0,229,160,0.1); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
  .badge-autoindex { background: rgba(255,165,2,0.1); color: var(--warn); border: 1px solid rgba(255,165,2,0.2); }

  /* ── Video grid ─────────────────────────────────────────────── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .video-card {
    background: var(--bg3);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
  }

  .video-card:hover { background: rgba(255,255,255,0.03); }

  .thumb {
    position: relative;
    aspect-ratio: 16/9;
    background: var(--bg2);
    overflow: hidden;
  }

  .thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .video-card:hover .thumb video { opacity: 0.85; }

  .thumb-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .play-circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(0,229,160,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.15s;
    box-shadow: 0 2px 16px rgba(0,229,160,0.3);
  }

  .video-card:hover .play-circle { transform: scale(1.1); background: var(--accent); }

  .play-circle svg { width: 16px; height: 16px; fill: #000; margin-left: 2px; }

  .thumb-tag {
    position: absolute;
    top: 8px;
    left: 8px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
  }

  .thumb-order {
    position: absolute;
    bottom: 8px;
    right: 8px;
    font-family: var(--mono);
    font-size: 9px;
    background: rgba(0,0,0,0.6);
    color: var(--muted);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .tag-intro    { background: rgba(0,229,160,0.15); color: var(--accent);  border: 1px solid rgba(0,229,160,0.25); }
  .tag-tutorial { background: rgba(0,148,255,0.15); color: var(--accent2); border: 1px solid rgba(0,148,255,0.25); }
  .tag-workflow { background: rgba(255,107,53,0.15); color: var(--accent3); border: 1px solid rgba(255,107,53,0.25); }
  .tag-demo     { background: rgba(168,139,250,0.15); color: #a78bfa;      border: 1px solid rgba(168,139,250,0.25); }
  .tag-hpc      { background: rgba(255,165,2,0.15); color: var(--warn);    border: 1px solid rgba(255,165,2,0.25); }

  .card-body { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; }

  .card-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 5px; line-height: 1.4; }

  .card-desc {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    line-height: 1.5;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .card-footer { display: flex; align-items: center; justify-content: space-between; font-size: 10px; font-family: var(--mono); color: var(--muted); }

  /* ── Modal ──────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    width: 100%;
    max-width: 900px;
    overflow: hidden;
  }

  .modal-video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }

  .modal-footer {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .modal-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .modal-meta  { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 3px; }

  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .modal-close:hover { background: rgba(255,71,87,0.1); border-color: rgba(255,71,87,0.25); color: var(--danger); }

  /* ── State boxes ────────────────────────────────────────────── */
  .state-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  .state-icon { font-size: 32px; margin-bottom: 12px; }
  .state-box h3 { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .state-box p  { font-size: 11px; font-family: var(--mono); line-height: 1.6; }
  .state-box code { color: var(--accent); font-family: var(--mono); font-size: 10px; }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-path">
    <span>studio</span>
    <span class="sep">/</span>
    <span class="current">videos</span>
  </div>
  <div class="topbar-badges">
    <span class="pill pill-green" id="statusPill">● LOADING</span>
    <span class="pill pill-blue">v0.1.0</span>
    <span class="pill pill-orange">BETA</span>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <video class="modal-video" id="modalVideo" controls autoplay></video>
    <div class="modal-footer">
      <div>
        <div class="modal-title" id="modalTitle">—</div>
        <div class="modal-meta" id="modalMeta">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="page-heading">
    <h1>Videos</h1>
    <p>Platform walkthroughs, tutorials and workflow demonstrations</p>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search videos..." oninput="filterVideos()">
    </div>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('intro',this)">Intro</button>
    <button class="filter-btn" onclick="setFilter('tutorial',this)">Tutorial</button>
    <button class="filter-btn" onclick="setFilter('workflow',this)">Workflow</button>
    <button class="filter-btn" onclick="setFilter('demo',this)">Demo</button>
    <button class="filter-btn" onclick="setFilter('hpc',this)">HPC</button>
    <span class="video-count" id="videoCount"></span>
  </div>

  <div class="manifest-hint" id="manifestHint" style="display:none">
    <span>Edit <code>videos.json</code> to set titles, descriptions and ordering — no code changes needed</span>
    <span class="source-badge" id="sourceBadge"></span>
  </div>

  <div id="content">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading videos...</p>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let allVideos = [];
let currentFilter = 'all';
let usingManifest = false;

// ── Load from videos.json manifest first, fallback to autoindex ──
async function loadVideos() {
  // Try manifest first
  try {
    const res = await fetch(`${API}/videos/videos.json`);
    if (res.ok) {
      const manifest = await res.json();
      // Sort by order field
      manifest.sort((a, b) => (a.order || 999) - (b.order || 999));
      allVideos = manifest.map(v => ({
        filename: v.filename,
        title: v.title || fileToTitle(v.filename),
        desc: v.desc || '',
        tag: v.tag || guessTag(v.filename),
        order: v.order || 999,
        url: `${API}/videos/${v.filename}`,
      }));
      usingManifest = true;
      showManifestHint(true);
      document.getElementById('statusPill').textContent = `● ${allVideos.length} VIDEOS`;
      renderVideos(allVideos);
      return;
    }
  } catch {}

  // Fallback: nginx autoindex
  try {
    const res = await fetch(`${API}/videos/`);
    const text = await res.text();
    let files = [];

    try {
      const json = JSON.parse(text);
      files = json.filter(f => /\.(mp4|webm|mov)$/i.test(f.name));
    } catch {
      const matches = [...text.matchAll(/href="([^"]+\.(mp4|webm|mov))"/gi)];
      files = matches.map(m => ({ name: m[1] })).filter(f => f.name !== 'videos.json');
    }

    allVideos = files.map(f => ({
      filename: f.name,
      title: fileToTitle(f.name),
      tag: guessTag(f.name),
      desc: tagDesc(guessTag(f.name)),
      url: `${API}/videos/${f.name}`,
    }));

    usingManifest = false;
    showManifestHint(false);
    document.getElementById('statusPill').textContent = `● ${allVideos.length} VIDEOS`;
    renderVideos(allVideos);
  } catch {
    document.getElementById('content').innerHTML = `
      <div class="state-box">
        <div class="state-icon">📂</div>
        <h3>No videos yet</h3>
        <p>Upload .mp4 files and create <code>videos.json</code> to get started.<br><br>
        Path: <code>~/Desktop/machine/omnibioai-videos/content/</code></p>
      </div>`;
    document.getElementById('statusPill').textContent = '● EMPTY';
  }
}

function showManifestHint(fromManifest) {
  const hint = document.getElementById('manifestHint');
  const badge = document.getElementById('sourceBadge');
  hint.style.display = 'flex';
  if (fromManifest) {
    badge.textContent = 'FROM MANIFEST';
    badge.className = 'source-badge badge-manifest';
  } else {
    hint.querySelector('span').textContent = 'No videos.json found — using auto-discovery. Create videos.json to set custom titles and ordering.';
    badge.textContent = 'AUTO-DETECTED';
    badge.className = 'source-badge badge-autoindex';
  }
}

function fileToTitle(filename) {
  return decodeURIComponent(filename)
    .replace(/\.(mp4|webm|mov)$/i, '')
    .replace(/[-_]/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function guessTag(filename) {
  const lower = filename.toLowerCase();
  if (lower.includes('intro') || lower.includes('overview') || lower.includes('start')) return 'intro';
  if (lower.includes('workflow') || lower.includes('pipeline')) return 'workflow';
  if (lower.includes('demo')) return 'demo';
  if (lower.includes('hpc') || lower.includes('slurm')) return 'hpc';
  return 'tutorial';
}

function tagDesc(tag) {
  return {
    intro:    'Introduction to OmniBioAI features and capabilities.',
    tutorial: 'Step-by-step walkthrough with hands-on examples.',
    workflow: 'End-to-end workflow from data input to results.',
    demo:     'Live demonstration of OmniBioAI in a research context.',
    hpc:      'Running OmniBioAI workloads on HPC clusters with Slurm.',
  }[tag] || '';
}

function renderVideos(videos) {
  document.getElementById('videoCount').textContent =
    `${videos.length} video${videos.length !== 1 ? 's' : ''}`;

  if (videos.length === 0) {
    document.getElementById('content').innerHTML = `
      <div class="state-box">
        <div class="state-icon">🎬</div>
        <h3>No videos found</h3>
        <p>Try a different search term or filter.</p>
      </div>`;
    return;
  }

  document.getElementById('content').innerHTML = `
    <div class="video-grid">
      ${videos.map((v, i) => `
        <div class="video-card"
          onclick="openModal('${v.url}','${escHtml(v.title)}','${v.tag}','${escHtml(v.desc)}')">
          <div class="thumb">
            <video src="${v.url}#t=2" preload="metadata" muted></video>
            <div class="thumb-overlay">
              <div class="play-circle">
                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
              </div>
            </div>
            <span class="thumb-tag tag-${v.tag}">${v.tag}</span>
            ${v.order && v.order !== 999 ? `<span class="thumb-order">#${v.order}</span>` : ''}
          </div>
          <div class="card-body">
            <div class="card-title">${escHtml(v.title)}</div>
            <div class="card-desc">${escHtml(v.desc)}</div>
            <div class="card-footer">
              <span>OmniBioAI Platform</span>
              <span>▶ Play</span>
            </div>
          </div>
        </div>`).join('')}
    </div>`;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setFilter(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterVideos();
}

function filterVideos() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderVideos(allVideos.filter(v => {
    const matchTag = currentFilter === 'all' || v.tag === currentFilter;
    const matchQ   = !q || v.title.toLowerCase().includes(q) || v.desc.toLowerCase().includes(q);
    return matchTag && matchQ;
  }));
}

function openModal(url, title, tag, desc) {
  document.getElementById('modalVideo').src = url;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMeta').textContent = tag + ' · OmniBioAI Platform';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const v = document.getElementById('modalVideo');
  v.pause(); v.src = '';
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

loadVideos();
</script>
</body>
</html>
